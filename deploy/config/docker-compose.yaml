# DeerFlow 离线生产环境配置
#
# 此配置用于离线 ARM 服务器部署
# 镜像已预先构建并导入，不使用 build 配置
#
# 使用方法:
#   1. 执行 deploy-offline.sh 自动配置环境变量
#   2. 或手动设置以下环境变量后运行:
#      export DEER_FLOW_HOME=/opt/deerflow/backend/.deer-flow
#      export DEER_FLOW_CONFIG_PATH=/opt/deerflow/config.yaml
#      export DEER_FLOW_EXTENSIONS_CONFIG_PATH=/opt/deerflow/extensions_config.json
#      export DEER_FLOW_REPO_ROOT=/opt/deerflow
#      export DEER_FLOW_DOCKER_SOCKET=/var/run/docker.sock
#      export BETTER_AUTH_SECRET=$(cat /opt/deerflow/backend/.deer-flow/.better-auth-secret)
#      docker compose up -d

services:
  # ── 反向代理 ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: deer-flow-nginx
    ports:
      - "${PORT:-2026}:2026"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway
      - langgraph
    networks:
      - deer-flow
    restart: unless-stopped

  # ── 前端服务 ──────────────────────────────────────────────────────────
  frontend:
    image: deer-flow-frontend:latest
    container_name: deer-flow-frontend
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
    env_file:
      - .env
    networks:
      - deer-flow
    restart: unless-stopped

  # ── Gateway API ───────────────────────────────────────────────────────
  gateway:
    image: deer-flow-backend:latest
    container_name: deer-flow-gateway
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers 2"
    volumes:
      - ${DEER_FLOW_CONFIG_PATH}:/app/backend/config.yaml:ro
      - ${DEER_FLOW_EXTENSIONS_CONFIG_PATH}:/app/backend/extensions_config.json:ro
      - ${DEER_FLOW_REPO_ROOT}/skills:/app/skills:ro
      - ${DEER_FLOW_HOME}:/app/backend/.deer-flow
      # DooD: 通过宿主机 Docker daemon 启动沙箱容器
      - ${DEER_FLOW_DOCKER_SOCKET}:/var/run/docker.sock
    working_dir: /app
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_HOST_BASE_DIR=${DEER_FLOW_HOME}
      - DEER_FLOW_HOST_SKILLS_PATH=${DEER_FLOW_REPO_ROOT}/skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow
    restart: unless-stopped

  # ── LangGraph 服务 ───────────────────────────────────────────────────
  langgraph:
    image: deer-flow-backend:latest
    container_name: deer-flow-langgraph
    command: sh -c "cd /app/backend && uv run langgraph dev --no-browser --allow-blocking --no-reload --host 0.0.0.0 --port 2024"
    volumes:
      - ${DEER_FLOW_CONFIG_PATH}:/app/config.yaml:ro
      - ${DEER_FLOW_EXTENSIONS_CONFIG_PATH}:/app/extensions_config.json:ro
      - ${DEER_FLOW_HOME}:/app/backend/.deer-flow
      - ${DEER_FLOW_REPO_ROOT}/skills:/app/skills:ro
      - ${DEER_FLOW_REPO_ROOT}/backend/.langgraph_api:/app/backend/.langgraph_api
      # DooD: 同 gateway
      - ${DEER_FLOW_DOCKER_SOCKET}:/var/run/docker.sock
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/extensions_config.json
      - DEER_FLOW_HOST_BASE_DIR=${DEER_FLOW_HOME}
      - DEER_FLOW_HOST_SKILLS_PATH=${DEER_FLOW_REPO_ROOT}/skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
      # 禁用 LangSmith 追踪
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow
    restart: unless-stopped

networks:
  deer-flow:
    driver: bridge
